# 法律法规知识库
# 存储常用法条及其适用场景
#
# 时效性字段说明：
#   status: active(现行有效) / amended(已修订) / repealed(已废止) / draft(草案)
#   effective_date: 生效日期 (YYYY-MM-DD)
#   last_verified: 最后验证日期 (YYYY-MM-DD)
#   repealed_by: 被哪部法律取代（仅 repealed 状态需要）

legal_provisions:
  # 民法典 - 合同编 (2021-01-01 生效)
  - law: "中华人民共和国民法典"
    article: "第四百七十条"
    title: "合同内容"
    content: "合同的内容由当事人约定，一般包括下列条款：（一）当事人的姓名或者名称和住所；（二）标的；（三）数量；（四）质量；（五）价款或者报酬；（六）履行期限、地点和方式；（七）违约责任；（八）解决争议的方法。"
    category: "合同"
    keywords: ["合同内容", "条款", "标的", "违约责任", "争议解决"]
    status: "active"
    effective_date: "2021-01-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国民法典"
    article: "第四百九十六条"
    title: "格式条款"
    content: "格式条款是当事人为了重复使用而预先拟定，并在订立合同时未与对方协商的条款。采用格式条款订立合同的，提供格式条款的一方应当遵循公平原则确定当事人之间的权利和义务，并采取合理的方式提示对方注意免除或者减轻其责任等与对方有重大利害关系的条款。"
    category: "合同"
    keywords: ["格式条款", "提示义务", "公平原则"]
    status: "active"
    effective_date: "2021-01-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国民法典"
    article: "第四百九十七条"
    title: "格式条款无效情形"
    content: "有下列情形之一的，该格式条款无效：（一）具有本法第一编第六章第三节和本法第五百零六条规定的无效情形；（二）提供格式条款一方不合理地免除或者减轻其责任、加重对方责任、限制对方主要权利；（三）提供格式条款一方排除对方主要权利。"
    category: "合同"
    keywords: ["格式条款无效", "排除权利", "免除责任"]
    status: "active"
    effective_date: "2021-01-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国民法典"
    article: "第五百零六条"
    title: "免责条款无效情形"
    content: "合同中的下列免责条款无效：（一）造成对方人身损害的；（二）因故意或者重大过失造成对方财产损失的。"
    category: "合同"
    keywords: ["免责条款", "无效", "人身损害", "重大过失"]
    status: "active"
    effective_date: "2021-01-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国民法典"
    article: "第五百七十七条"
    title: "违约责任"
    content: "当事人一方不履行合同义务或者履行合同义务不符合约定的，应当承担继续履行、采取补救措施或者赔偿损失等违约责任。"
    category: "合同"
    keywords: ["违约责任", "继续履行", "赔偿损失"]
    status: "active"
    effective_date: "2021-01-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国民法典"
    article: "第六条"
    title: "公平原则"
    content: "民事主体从事民事活动，应当遵循公平原则，合理确定各方的权利和义务。"
    category: "基本原则"
    keywords: ["公平原则", "权利义务"]
    status: "active"
    effective_date: "2021-01-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国民法典"
    article: "第五百一十条"
    title: "合同约定不明的补充"
    content: "合同生效后，当事人就质量、价款或者报酬、履行地点等内容没有约定或者约定不明确的，可以协议补充；不能达成补充协议的，按照合同相关条款或者交易习惯确定。"
    category: "合同"
    keywords: ["约定不明", "补充协议", "交易习惯"]
    status: "active"
    effective_date: "2021-01-01"
    last_verified: "2026-05-28"

  # 个人信息保护法 (2021-11-01 生效)
  - law: "中华人民共和国个人信息保护法"
    article: "第六条"
    title: "最小必要原则"
    content: "处理个人信息应当具有明确、合理的目的，并应当与处理目的直接相关，采取对个人权益影响最小的方式。收集个人信息，应当限于实现处理目的的最小范围，不得过度收集个人信息。"
    category: "个人信息保护"
    keywords: ["最小必要", "过度收集", "个人信息"]
    status: "active"
    effective_date: "2021-11-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国个人信息保护法"
    article: "第十三条"
    title: "合法性基础"
    content: "符合下列情形之一的，个人信息处理者方可处理个人信息：（一）取得个人的同意；（二）为订立、履行个人作为一方当事人的合同所必需；（三）为履行法定职责或者法定义务所必需；（四）为应对突发公共卫生事件，或者紧急情况下为保护自然人的生命健康和财产安全所必需；（五）为公共利益实施新闻报道、舆论监督等行为，在合理的范围内处理个人信息；（六）依照本法规定在合理的范围内处理个人自行公开或者其他已经合法公开的个人信息；（七）法律、行政法规规定的其他情形。"
    category: "个人信息保护"
    keywords: ["合法性基础", "同意", "个人信息处理"]
    status: "active"
    effective_date: "2021-11-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国个人信息保护法"
    article: "第三十八条"
    title: "个人信息跨境提供"
    content: "个人信息处理者因业务等需要，确需向中华人民共和国境外提供个人信息的，应当具备下列条件之一：（一）依照本法第四十条的规定通过国家网信部门组织的安全评估；（二）按照国家网信部门的规定经专业机构进行个人信息保护认证；（三）按照国家网信部门制定的标准合同与境外接收方订立合同，约定双方的权利和义务。"
    category: "个人信息保护"
    keywords: ["跨境传输", "数据出境", "安全评估"]
    status: "active"
    effective_date: "2021-11-01"
    last_verified: "2026-05-28"

  # 数据安全法 (2021-09-01 生效)
  - law: "中华人民共和国数据安全法"
    article: "第二十一条"
    title: "数据分类分级保护"
    content: "国家建立数据分类分级保护制度，根据数据在经济社会发展中的重要程度，以及一旦遭到篡改、破坏、泄露或者非法获取、非法利用，对国家安全、公共利益或者个人、组织合法权益造成的危害程度，对数据实行分类分级保护。"
    category: "数据安全"
    keywords: ["数据分类", "分级保护", "重要数据"]
    status: "active"
    effective_date: "2021-09-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国数据安全法"
    article: "第二十七条"
    title: "数据安全保护义务"
    content: "开展数据处理活动应当依照法律、法规的规定，建立健全全流程数据安全管理制度，组织开展数据安全教育培训，采取相应的技术措施和其他必要措施，保障数据安全。"
    category: "数据安全"
    keywords: ["数据安全", "安全管理制度", "技术措施"]
    status: "active"
    effective_date: "2021-09-01"
    last_verified: "2026-05-28"

  # 消费者权益保护法 (2014-03-15 修订生效)
  - law: "中华人民共和国消费者权益保护法"
    article: "第二十六条"
    title: "格式条款限制"
    content: "经营者在经营活动中使用格式条款的，应当以显著方式提请消费者注意商品或者服务的数量和质量、价款或者费用、履行期限和方式、安全注意事项和风险警示、售后服务、民事责任等与消费者有重大利害关系的内容，并按照消费者的要求予以说明。经营者不得以格式条款、通知、声明、店堂告示等方式，作出排除或者限制消费者权利、减轻或者免除经营者责任、加重消费者责任等对消费者不公平、不合理的规定。"
    category: "消费者保护"
    keywords: ["格式条款", "消费者权利", "显著提示"]
    status: "active"
    effective_date: "2014-03-15"
    last_verified: "2026-05-28"

  # 民法典 - 定金相关（取代原《担保法》）
  - law: "中华人民共和国民法典"
    article: "第五百八十六条"
    title: "定金合同"
    content: "当事人可以约定一方向对方给付定金作为债权的担保。定金合同自实际交付定金时成立。定金的数额由当事人约定；但是，不得超过主合同标的额的百分之二十，超过部分不产生定金的效力。实际交付的定金数额多于或者少于约定数额的，视为变更约定的定金数额。"
    category: "合同"
    keywords: ["定金", "定金合同", "定金罚则", "担保", "百分之二十"]
    status: "active"
    effective_date: "2021-01-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国民法典"
    article: "第五百八十七条"
    title: "定金罚则"
    content: "债务人履行债务的，定金应当抵作价款或者收回。给付定金的一方不履行债务或者履行债务不符合约定，致使不能实现合同目的的，无权请求返还定金；收受定金的一方不履行债务或者履行债务不符合约定，致使不能实现合同目的的，应当双倍返还定金。"
    category: "合同"
    keywords: ["定金罚则", "定金", "双倍返还", "无权返还"]
    status: "active"
    effective_date: "2021-01-01"
    last_verified: "2026-05-28"

  # 民法典 - 违约金相关
  - law: "中华人民共和国民法典"
    article: "第五百八十五条"
    title: "违约金约定及调整"
    content: "当事人可以约定一方违约时应当根据违约情况向对方支付一定数额的违约金，也可以约定因违约产生的损失赔偿额的计算方法。约定的违约金低于造成的损失的，人民法院或者仲裁机构可以根据当事人的请求予以增加；约定的违约金过分高于造成的损失的，人民法院或者仲裁机构可以根据当事人的请求予以适当减少。"
    category: "合同"
    keywords: ["违约金", "赔偿金", "损失赔偿", "过高调整", "过低增加"]
    status: "active"
    effective_date: "2021-01-01"
    last_verified: "2026-05-28"

  # 劳动合同法 (2013-07-01 修订生效)
  - law: "中华人民共和国劳动合同法"
    article: "第二十三条"
    title: "竞业限制"
    content: "用人单位与劳动者可以在劳动合同中约定保守用人单位的商业秘密和与知识产权相关的保密事项。对负有保密义务的劳动者，用人单位可以在劳动合同或者保密协议中与劳动者约定竞业限制条款，并约定在解除或者终止劳动合同后，在竞业限制期限内按月给予劳动者经济补偿。劳动者违反竞业限制约定的，应当按照约定向用人单位支付违约金。"
    category: "合同"
    keywords: ["竞业限制", "竞业禁止", "经济补偿", "保密", "违约金"]
    status: "active"
    effective_date: "2013-07-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国劳动合同法"
    article: "第三十一条"
    title: "加班"
    content: "用人单位应当严格执行劳动定额标准，不得强迫或者变相强迫劳动者加班。用人单位安排加班的，应当按照国家有关规定向劳动者支付加班费。"
    category: "合同"
    keywords: ["加班", "加班费", "强迫加班", "劳动定额"]
    status: "active"
    effective_date: "2013-07-01"
    last_verified: "2026-05-28"

  - law: "中华人民共和国劳动合同法"
    article: "第八十五条"
    title: "加班费支付"
    content: "用人单位有下列情形之一的，由劳动行政部门责令限期支付劳动报酬、加班费或者经济补偿；劳动报酬低于当地最低工资标准的，应当支付其差额部分；逾期不支付的，责令用人单位按应付金额百分之五十以上百分之一百以下的标准向劳动者加付赔偿金：（一）未按照劳动合同的约定或者国家规定及时足额支付劳动者劳动报酬的；（二）低于当地最低工资标准支付劳动者工资的；（三）安排加班不支付加班费的；（四）解除或者终止劳动合同，未依照本法规定向劳动者支付经济补偿的。"
    category: "合同"
    keywords: ["加班费", "劳动报酬", "最低工资", "赔偿金", "经济补偿"]
    status: "active"
    effective_date: "2013-07-01"
    last_verified: "2026-05-28"

