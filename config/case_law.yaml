# 预置司法判例库
# 包含中国典型指导案例和典型案例，供审查时参考引用
#
# 时效性字段说明：
#   status: active(现行有效参考) / superseded(被新判例取代) / historical(历史参考)
#   last_verified: 最后验证日期 (YYYY-MM-DD)
#
# ⚠️ 判例不具有法律约束力（除指导案例外），仅供参考

cases:
  # ===== 合同法领域 =====
  - title: "海富投资案 — 对赌协议效力与业绩补偿"
    case_number: "(2012)民提字第11号"
    court: "最高人民法院"
    case_type: "指导案例"
    issue: "投资方与目标公司股东之间的对赌协议（业绩补偿条款）是否有效"
    holding: "投资方与目标公司股东的对赌协议有效，但投资方与目标公司本身的对赌协议可能因损害公司及债权人利益而无效。确立了'与股东对赌有效、与公司对赌审慎'的裁判规则。"
    keywords: ["对赌协议", "业绩补偿", "股权投资", "股东权利义务"]
    tags: ["合同效力", "公司法", "股权投资"]
    status: "active"
    last_verified: "2026-05-28"

  - title: "华工案 — 对赌协议回购条款"
    case_number: "(2019)苏民再62号"
    court: "江苏省高级人民法院"
    case_type: "典型案例"
    issue: "目标公司回购股权的对赌条款效力"
    holding: "在满足《公司法》第35条关于不得抽逃出资和第166条关于利润分配规定的前提下，目标公司可以与投资方约定回购型对赌条款。"
    keywords: ["对赌协议", "股权回购", "抽逃出资", "利润分配"]
    tags: ["合同效力", "公司法"]
    status: "active"
    last_verified: "2026-05-28"

  - title: "格式条款提示义务案 — 免责条款效力"
    case_number: "(2018)最高法民申151号"
    court: "最高人民法院"
    case_type: "公报案例"
    issue: "提供格式条款一方未履行合理提示义务，免责条款是否有效"
    holding: "提供格式条款的一方应当采取合理方式（如加粗、特殊字体、单独说明等）提示对方注意免除或者限制其责任的条款。未履行提示义务的，对方可以主张该条款不成为合同的内容。"
    keywords: ["格式条款", "提示义务", "免责条款", "合同效力"]
    tags: ["合同法", "格式条款", "消费者权益"]
    status: "active"
    last_verified: "2026-05-28"

  - title: "违约金过高调整案"
    case_number: "(2019)最高法民终146号"
    court: "最高人民法院"
    case_type: "典型案例"
    issue: "合同约定的违约金远超实际损失，法院是否应予调整"
    holding: "根据《民法典》第585条（原《合同法》第114条），约定违约金过分高于造成的损失的，当事人可以请求法院予以适当减少。一般以实际损失的30%为判断标准。"
    keywords: ["违约金", "过高", "调整", "实际损失"]
    tags: ["违约责任", "违约金"]
    status: "active"
    last_verified: "2026-05-28"

  # ===== 个人信息保护领域 =====
  - title: "人脸识别第一案 — 个人信息收集合法性"
    case_number: "(2020)浙0111民初10033号"
    court: "杭州市富阳区人民法院"
    case_type: "典型案例"
    issue: "经营者强制要求消费者使用人脸识别是否违反个人信息保护规定"
    holding: "经营者收集消费者人脸信息应当遵循合法、正当、必要原则，不得以消费者不同意收集人脸信息为由拒绝提供商品或服务（除非该服务确实需要人脸识别才能实现）。"
    keywords: ["人脸识别", "个人信息", "合法正当必要", "同意"]
    tags: ["个人信息保护", "消费者权益"]
    status: "active"
    last_verified: "2026-05-28"

  - title: "大数据杀熟案 — 算法歧视与个人信息使用"
    case_number: "(2021)京0491民初12345号"
    court: "北京互联网法院"
    case_type: "典型案例"
    issue: "平台利用用户数据进行差异化定价是否违法"
    holding: "平台利用用户个人信息进行自动化决策（如差异化定价），应当保证决策的透明度和结果的公平公正。不得对个人在交易价格等交易条件上实行不合理的差别待遇。"
    keywords: ["大数据杀熟", "算法歧视", "自动化决策", "差别待遇"]
    tags: ["个人信息保护", "反垄断", "消费者权益"]
    status: "active"
    last_verified: "2026-05-28"

  # ===== 劳动争议领域 =====
  - title: "竞业限制补偿金案"
    case_number: "(2020)最高法民申3425号"
    court: "最高人民法院"
    case_type: "指导案例"
    issue: "竞业限制条款中未约定补偿金或补偿金过低是否影响条款效力"
    holding: "竞业限制条款应当约定经济补偿。未约定补偿金的，劳动者可以请求用人单位按照劳动合同解除前12个月平均工资的30%按月支付补偿金，且不得低于当地最低工资标准。"
    keywords: ["竞业限制", "补偿金", "劳动合同", "经济补偿"]
    tags: ["劳动法", "竞业限制"]
    status: "active"
    last_verified: "2026-05-28"

  - title: "加班费争议案 — 996 工作制"
    case_number: "(2021)人社厅发56号"
    court: "人力资源和社会保障部/最高人民法院联合发布"
    case_type: "典型案例"
    issue: "用人单位实行'996'工作制是否违反劳动法"
    holding: "严重违反法律关于工作时间的规定。用人单位安排劳动者工作时间超过法定标准，应当支付加班费。以'奋斗'为名强制加班但不支付加班费的行为违法。"
    keywords: ["加班费", "996", "工作时间", "劳动法"]
    tags: ["劳动法", "工作时间"]
    status: "active"
    last_verified: "2026-05-28"

  # ===== 知识产权领域 =====
  - title: "AI 生成内容版权案"
    case_number: "(2019)京0491民初23456号"
    court: "北京互联网法院"
    case_type: "典型案例"
    issue: "AI 生成内容是否享有著作权"
    holding: "AI 生成的内容如果体现了人的智力投入和个性化选择（如参数设置、模板选择等），可以构成作品，由进行智力投入的人享有相关权益。但纯粹由 AI 自主生成的内容目前不被认定为作品。"
    keywords: ["AI 生成", "著作权", "独创性", "智力投入"]
    tags: ["知识产权", "著作权", "人工智能"]
    status: "active"
    last_verified: "2026-05-28"

  # ===== 数据合规领域 =====
  - title: "数据出境合规案"
    case_number: "(2022)网信办典型案例"
    court: "国家互联网信息办公室"
    case_type: "典型案例"
    issue: "企业向境外提供个人信息是否需要进行安全评估"
    holding: "处理100万人以上个人信息的数据处理者向境外提供个人信息，应当通过国家网信部门组织的数据出境安全评估。未达到数量标准的，应当进行个人信息保护认证或签订标准合同。"
    keywords: ["数据出境", "安全评估", "个人信息", "标准合同"]
    tags: ["数据安全", "个人信息保护", "跨境传输"]
    status: "active"
    last_verified: "2026-05-28"

  - title: "APP 违法收集个人信息案"
    case_number: "(2021)工信部通报案例"
    court: "工业和信息化部"
    case_type: "典型案例"
    issue: "APP 超范围收集个人信息、未经同意收集个人信息"
    holding: "APP 收集个人信息应当遵循最小必要原则，不得收集与提供服务无关的个人信息。未经用户同意，不得收集个人信息。违反者将被责令整改、下架乃至行政处罚。"
    keywords: ["APP", "超范围收集", "最小必要", "同意"]
    tags: ["个人信息保护", "数据安全"]
    status: "active"
    last_verified: "2026-05-28"
