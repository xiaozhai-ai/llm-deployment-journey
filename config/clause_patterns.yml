# ============================================================
# 条款标题匹配配置
# ============================================================
# 修改此文件可自定义条款标题识别规则，无需改代码。
# 正则按优先级（priority）排序，数字越小优先级越高。

patterns:
  - name: "中文条/章"
    regex: "^(第[一二三四五六七八九十百千零壹贰叁肆伍陆柒捌玖拾佰仟\d]+[条章节条款])\\s*"
    priority: 1

  - name: "中文数字序号"
    regex: "^([一二三四五六七八九十百]+[、.．])\\s*"
    priority: 2

  - name: "第N条/第N章（阿拉伯数字）"
    regex: "^(第\\d+[条章节])\\s*"
    priority: 3

  - name: "纯数字序号"
    regex: "^(\\d+[.．、])\\s*([^\\n]{2,30})$"
    priority: 4

  - name: "数字层级编号"
    regex: "^(\\d+(?:\\.\\d+)+)[\\.、\\s]\\s*([^\\n]{2,30})$"
    priority: 4

  - name: "英文 Article"
    regex: "^(Article\\s+[IVXLCDM\\d]+)\\s*"
    priority: 5

  - name: "英文 Section"
    regex: "^(Section\\s+\\d+(?:\\.\\d+)?)\\s*"
    priority: 5

  - name: "英文 Clause/Paragraph"
    regex: "^((?:Clause|Paragraph|Para\\.?)\\s+\\d+(?:\\.\\d+)?)\\s*"
    priority: 5

  - name: "§ 节符号"
    regex: "^(§\\s*\\d+(?:\\.\\d+)*)\\s*"
    priority: 5

  - name: "带括号数字/中文序号"
    regex: "^[（(]([一二三四五六七八九十百\\d]+)[）)]\\s*([^\\n]{2,30})$"
    priority: 6

  - name: "带括号小写字母"
    regex: "^[（(]([a-z])[）)]\\s*([^\\n]{2,30})$"
    priority: 6

  - name: "罗马数字序号"
    regex: "^([IVXLCDM]+)[\\.、\\s]\\s*([^\\n]{2,30})$"
    priority: 7

  - name: "附录/Appendix"
    regex: "^((?:附录|Appendix)\\s*[A-Z\\d]*)\\s*"
    priority: 8

